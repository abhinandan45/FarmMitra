<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Disease Detection</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #fdfdfd; margin: 0; }
    .navbar { background-color: #28a745; padding: 15px 30px; color: white; display: flex; justify-content: space-between; }
    .navbar a { color: white; margin-left: 20px; text-decoration: none; font-weight: bold; }

    .container {
      max-width: 700px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    input[type="file"] {
      margin: 20px 0;
    }

    button {
      padding: 12px 25px;
      background-color: #28a745;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      background-color: #fff8e6;
      padding: 15px;
      border-left: 5px solid #ffc107;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div><strong>FarmMitra</strong></div>
    <div>
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('crop_predict') }}">Crop</a>
      <a href="{{ url_for('disease_detect') }}">Disease</a>
      <a href="{{ url_for('chatbot') }}">Chatbot</a>
    </div>
  </div>

  <div class="container">
    <h2>🦠 Plant Disease Detection</h2>
    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="image" accept="image/*" required>
      <br>
      <button type="submit">Detect Disease</button>
    </form>

    {% if result %}
      <div class="result">🔍 {{ result }}</div>
    {% endif %}
  </div>
</body>
</html>

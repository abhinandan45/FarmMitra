<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Farm ChatBot</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f3f9ff; }
    .navbar { background-color: #28a745; padding: 15px 30px; color: white; display: flex; justify-content: space-between; }
    .navbar a { color: white; margin-left: 20px; text-decoration: none; font-weight: bold; }

    .container {
      max-width: 700px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 25px;
      background: #28a745;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .reply {
      margin-top: 20px;
      background-color: #e3fcec;
      padding: 15px;
      border-left: 5px solid #28a745;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div><strong>FarmMitra</strong></div>
    <div>
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('crop_predict') }}">Crop</a>
      <a href="{{ url_for('disease_detect') }}">Disease</a>
      <a href="{{ url_for('chatbot') }}">Chatbot</a>
    </div>
  </div>

  <div class="container">
    <h2>💬 Ask Your Farming Question</h2>
    <form method="POST">
      <textarea name="question" placeholder="Type your question here..." required></textarea>
      <button type="submit">Ask</button>
    </form>

    {% if reply %}
      <div class="reply"><strong>AI:</strong> {{ reply }}</div>
    {% endif %}
  </div>
</body>
</html>

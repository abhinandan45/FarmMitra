<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crop Prediction</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f8fff8; margin: 0; padding: 0; }
    .navbar { background-color: #28a745; padding: 15px 30px; color: white; display: flex; justify-content: space-between; }
    .navbar a { color: white; margin-left: 20px; text-decoration: none; font-weight: bold; }

    .container {
      max-width: 700px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    input[type="number"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 25px;
      background: linear-gradient(to right, #28a745, #218838);
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      background-color: #eaffea;
      padding: 15px;
      border-left: 5px solid #28a745;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div><strong>FarmMitra</strong></div>
    <div>
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('crop_predict') }}">Crop</a>
      <a href="{{ url_for('disease_detect') }}">Disease</a>
      <a href="{{ url_for('chatbot') }}">Chatbot</a>
    </div>
  </div>

  <div class="container">
    <h2>🌾 Crop Recommendation</h2>
    <form method="POST">
      <input type="number" name="nitrogen" placeholder="Nitrogen" required>
      <input type="number" name="phosphorus" placeholder="Phosphorus" required>
      <input type="number" name="potassium" placeholder="Potassium" required>
      <input type="number" name="temperature" placeholder="Temperature (°C)" required>
      <input type="number" name="humidity" placeholder="Humidity (%)" required>
      <input type="number" name="ph" placeholder="pH level" required>
      <input type="number" name="rainfall" placeholder="Rainfall (mm)" required>
      <button type="submit">Predict Crop</button>
    </form>

    {% if prediction %}
      <div class="result">🌱 Recommended Crop: <strong>{{ prediction }}</strong></div>
    {% endif %}
  </div>
</body>
</html>
